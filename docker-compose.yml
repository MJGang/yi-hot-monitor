services:
  mysql:
    image: mysql:8.0
    container_name: yi-hot-monitor-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: hotspot123
      MYSQL_DATABASE: hotspot_db
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-photspot123"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
    container_name: yi-hot-monitor-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/.venv
    environment:
      DATABASE_URL: mysql+aiomysql://root:hotspot123@mysql:3306/hotspot_db
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_PASSWORD: hotspot123
      MYSQL_DATABASE: hotspot_db
    env_file:
      - ./backend/.env
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: yi-hot-monitor-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
    environment:
      VITE_BACKEND_TARGET: http://backend:3001
    depends_on:
      - backend

volumes:
  mysql_data:
