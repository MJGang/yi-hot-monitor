  <style>
    * { scrollbar-width: thin; scrollbar-color: rgba(201, 177, 255, 0.5) transparent; }

    body {

    .liquid-bg {
      background:

        radial-gradient(ellipse 70% 50% at 90% 8%, rgba(116, 185, 255, 0.65) 0%, transparent 55%),
        radial-gradient(ellipse 60% 50% at 88% 90%, rgba(125, 205, 170, 0.6) 0%, transparent 55%),
        radial-gradient(ellipse 55% 45% at 12% 92%, rgba(255, 138, 128, 0.55) 0%, transparent 55%),
        radial-gradient(ellipse 45% 35% at 50% 15%, rgba(255, 217, 61, 0.3) 0%, transparent 50%),
        radial-gradient(ellipse 50% 40% at 50% 85%, rgba(255, 170, 165, 0.35) 0%, transparent 50%),
        radial-gradient(ellipse 40% 30% at 75% 50%, rgba(168, 216, 255, 0.3) 0%, transparent 50%),
        linear-gradient(160deg, #FFF9F5 0%, #FFF5EB 35%, #FFFDF9 100%);

    .liquid-glass {
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(40px) saturate(180%);

      border: 0.5px solid rgba(255, 255, 255, 0.5);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.06),
        0 2px 8px rgba(0, 0, 0, 0.03),
        inset 0 1px 0 rgba(255, 255, 255, 0.9),
        inset 0 -0.5px 0 rgba(0, 0, 0, 0.04);
    }
    .liquid-glass:hover {
      background: rgba(255, 255, 255, 0.38);
      box-shadow:
        0 12px 40px rgba(0, 0, 0, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.95);
    }

    .liquid-card {
      background: rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(30px) saturate(160%);
      -webkit-backdrop-filter: blur(30px) saturate(160%);
      border: 0.5px solid rgba(255, 255, 255, 0.4);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.05),
        inset 0 1px 0 rgba(255, 255, 255, 0.85);
    }
    .liquid-card:hover {
      background: rgba(255, 255, 255, 0.45);
      box-shadow:
        0 16px 48px rgba(0, 0, 0, 0.1),
        inset 0 1px 0 rgba(255, 255, 255, 0.95);
    }

    .icon-pill {
      background: rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 0.5px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.05), inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }

    .nav-item {
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 16px;
      margin: 2px 8px;
      background: transparent;
      border: 0.5px solid transparent;
    }
    .nav-item:hover { background: rgba(255, 255, 255, 0.3); border-color: rgba(255, 255, 255, 0.4); }
    .nav-item.active {
      background: rgba(255, 255, 255, 0.45);
      border: 0.5px solid rgba(255, 255, 255, 0.55);
      box-shadow: 0 4px 20px rgba(125, 205, 170, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }

    .glass-input {
      background: rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 0.5px solid rgba(255, 255, 255, 0.5);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
      transition: all 0.2s ease;
    }
    .glass-input:focus {
      background: rgba(255, 255, 255, 0.5);
      border-color: rgba(125, 205, 170, 0.6);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9), 0 0 0 3px rgba(125, 205, 170, 0.15);
    }

    .glass-btn {
      background: rgba(255, 255, 255, 0.35);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 0.5px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.05), inset 0 1px 0 rgba(255, 255, 255, 0.9);
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .glass-btn:hover {
      background: rgba(255, 255, 255, 0.5);
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.95);
    }
    .glass-btn-primary {
      background: rgba(125, 205, 170, 0.5);
      backdrop-filter: blur(20px);
      border: 0.5px solid rgba(125, 205, 170, 0.6);
      box-shadow: 0 4px 20px rgba(125, 205, 170, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.7);
    }
    .glass-btn-primary:hover {
      background: rgba(125, 205, 170, 0.65);
      box-shadow: 0 8px 32px rgba(125, 205, 170, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.8);
    }

    .toggle-switch {
      position: relative;
      width: 52px;
      height: 30px;
      background: rgba(0, 0, 0, 0.1);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 15px;
      cursor: pointer;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      border: 0.5px solid rgba(255, 255, 255, 0.3);
    }
    .toggle-switch.active {
      background: rgba(125, 205, 170, 0.6);
      border-color: rgba(125, 205, 170, 0.5);
    }
    .toggle-switch::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 22px;
      height: 22px;
      background: white;
      border-radius: 50%;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15), 0 1px 2px rgba(0, 0, 0, 0.08);
    }
    .toggle-switch.active::after { left: 25px; }

    .window-frame { border-radius: 20px; overflow: hidden; box-shadow: 0 32px 80px rgba(0, 0, 0, 0.12); }
    .title-bar { -webkit-app-region: drag; }
    .title-bar button { -webkit-app-region: no-drag; }

    .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .card-hover:hover { transform: translateY(-3px); }
  </style>
