<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设置 - Yi Hot Monitor</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>

  <svg style="display: none;">
    <symbol id="icon-x" viewBox="0 0 24 24">
      <path fill="currentColor" d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
    </symbol>
    <symbol id="icon-bing" viewBox="0 0 24 24">
      <path fill="#008373" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-5.5-2.5l7.51-3.49L17.5 6.5 9.99 9.99 6.5 17.5zm5.5-6.6c.61 0 1.1.49 1.1 1.1s-.49 1.1-1.1 1.1-1.1-.49-1.1-1.1.49-1.1 1.1-1.1z"/>
    </symbol>
  </svg>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'cream': '#FFF9F5',
            'cream-dark': '#FFF5EB',
            'cream-light': '#FFFDF9',
            'vanilla': '#FEF7F0',
            'coral': '#FF8A80',
            'coral-dark': '#E57373',
            'coral-light': '#FFB4AB',
            'mint': '#7DCTAA',
            'mint-dark': '#5FB88F',
            'mint-light': '#A8E6CF',
            'sunshine': '#FFD93D',
            'sunshine-light': '#FFF3B0',
            'lavender': '#C9B1FF',
            'lavender-dark': '#A78BFA',
            'lavender-light': '#E0D6FF',
            'sky': '#74B9FF',
            'sky-light': '#A8D8FF',
            'peach': '#FFAAA5',
            'bubblegum': '#FF99C8',
            'text-primary': '#1A1A2E',
            'text-secondary': '#4A5568',
            'text-muted': '#A0AEC0',
            'success': '#00B894',
            'warning': '#FDCB6E',
            'danger': '#E17055',
            'info': '#74B9FF',
          },
          fontFamily: {
            display: ['Inter', 'sans-serif'],
            body: ['Inter', 'sans-serif'],
          },
          borderRadius: {
            '2xl': '1rem',
            '3xl': '1.5rem',
          },
        },
      },
    }
  </script>

  <style>
    * { scrollbar-width: thin; scrollbar-color: rgba(201, 177, 255, 0.5) transparent; }

    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    .liquid-bg {
      background:
        radial-gradient(ellipse 80% 60% at 10% 5%, rgba(201, 177, 255, 0.7) 0%, transparent 60%),
        radial-gradient(ellipse 70% 50% at 90% 8%, rgba(116, 185, 255, 0.65) 0%, transparent 55%),
        radial-gradient(ellipse 60% 50% at 88% 90%, rgba(125, 205, 170, 0.6) 0%, transparent 55%),
        radial-gradient(ellipse 55% 45% at 12% 92%, rgba(255, 138, 128, 0.55) 0%, transparent 55%),
        radial-gradient(ellipse 45% 35% at 50% 15%, rgba(255, 217, 61, 0.3) 0%, transparent 50%),
        radial-gradient(ellipse 50% 40% at 50% 85%, rgba(255, 170, 165, 0.35) 0%, transparent 50%),
        radial-gradient(ellipse 40% 30% at 75% 50%, rgba(168, 216, 255, 0.3) 0%, transparent 50%),
        linear-gradient(160deg, #FFF9F5 0%, #FFF5EB 35%, #FFFDF9 100%);
    }

    .liquid-glass {
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      border: 0.5px solid rgba(255, 255, 255, 0.5);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.06),
        inset 0 1px 0 rgba(255, 255, 255, 0.9),
        inset 0 -0.5px 0 rgba(0, 0, 0, 0.04);
    }

    .liquid-card {
      background: rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(30px) saturate(160%);
      -webkit-backdrop-filter: blur(30px) saturate(160%);
      border: 0.5px solid rgba(255, 255, 255, 0.4);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.05),
        inset 0 1px 0 rgba(255, 255, 255, 0.85);
    }

    .icon-pill {
      background: rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 0.5px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.05), inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }

    .nav-item {
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 16px;
      margin: 2px 8px;
      background: transparent;
      border: 0.5px solid transparent;
    }
    .nav-item:hover { background: rgba(255, 255, 255, 0.3); border-color: rgba(255, 255, 255, 0.4); }
    .nav-item.active {
      background: rgba(255, 255, 255, 0.45);
      border: 0.5px solid rgba(255, 255, 255, 0.55);
      box-shadow: 0 4px 20px rgba(255, 138, 128, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }

    .glass-input, .glass-select {
      background: rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 0.5px solid rgba(255, 255, 255, 0.5);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
      transition: all 0.2s ease;
    }
    .glass-input:focus, .glass-select:focus {
      background: rgba(255, 255, 255, 0.5);
      border-color: rgba(201, 177, 255, 0.6);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9), 0 0 0 3px rgba(201, 177, 255, 0.15);
    }

    .glass-btn {
      background: rgba(255, 255, 255, 0.35);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 0.5px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.05), inset 0 1px 0 rgba(255, 255, 255, 0.9);
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .glass-btn:hover {
      background: rgba(255, 255, 255, 0.5);
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.95);
    }
    .glass-btn-primary {
      background: rgba(201, 177, 255, 0.5);
      backdrop-filter: blur(20px);
      border: 0.5px solid rgba(201, 177, 255, 0.6);
      box-shadow: 0 4px 20px rgba(201, 177, 255, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.7);
    }
    .glass-btn-primary:hover {
      background: rgba(201, 177, 255, 0.65);
      box-shadow: 0 8px 32px rgba(201, 177, 255, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.8);
    }

    .toggle-switch {
      position: relative;
      width: 52px;
      height: 30px;
      background: rgba(0, 0, 0, 0.1);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 15px;
      cursor: pointer;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      border: 0.5px solid rgba(255, 255, 255, 0.3);
    }
    .toggle-switch.active {
      background: rgba(125, 205, 170, 0.6);
      border-color: rgba(125, 205, 170, 0.5);
    }
    .toggle-switch::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 22px;
      height: 22px;
      background: white;
      border-radius: 50%;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15), 0 1px 2px rgba(0, 0, 0, 0.08);
    }
    .toggle-switch.active::after { left: 25px; }

    .window-frame { border-radius: 20px; overflow: hidden; box-shadow: 0 32px 80px rgba(0, 0, 0, 0.12); }
    .title-bar { -webkit-app-region: drag; }
    .title-bar button { -webkit-app-region: no-drag; }

    .card-hover { transition: all 0.25s ease; }
  </style>
</head>
<body class="window-frame">

  <div class="h-screen flex flex-col liquid-bg">

    <!-- Title Bar -->
    <div class="liquid-glass h-12 flex items-center justify-between px-5" style="border-radius: 0;">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-2xl liquid-glass flex items-center justify-center" style="padding: 0;">
          <div class="w-7 h-7 rounded-xl bg-gradient-to-br from-coral to-lavender flex items-center justify-center shadow-sm">
            <i data-lucide="flame" class="w-4 h-4 text-white"></i>
          </div>
        </div>
        <span class="font-display font-bold text-lg tracking-wide">
          <span class="text-coral">YI</span><span class="text-text-primary">HOT</span><span class="text-lavender">MONITOR</span>
        </span>
      </div>
      <div class="flex items-center gap-1">
        <button class="w-10 h-9 flex items-center justify-center hover:bg-white/20 rounded-xl transition-colors cursor-pointer rounded-2xl">
          <i data-lucide="minus" class="w-5 h-5 text-text-secondary"></i>
        </button>
        <button class="w-10 h-9 flex items-center justify-center hover:bg-white/20 rounded-xl transition-colors cursor-pointer rounded-2xl">
          <i data-lucide="square" class="w-4 h-4 text-text-secondary"></i>
        </button>
        <button class="w-10 h-9 flex items-center justify-center hover:bg-coral/15 rounded-xl transition-colors cursor-pointer rounded-2xl">
          <i data-lucide="x" class="w-5 h-5 text-text-secondary"></i>
        </button>
      </div>
    </div>

    <!-- Main Content -->
    <div class="flex-1 flex overflow-hidden" style="padding: 12px;">

      <!-- Sidebar -->
      <nav class="liquid-glass w-60 flex flex-col mr-4" style="border-radius: 24px; padding: 8px;">
        <div class="flex-1 py-3">
          <a href="index.html" class="nav-item flex items-center gap-3 px-4 py-3 text-text-secondary cursor-pointer">
            <span class="icon-pill w-10 h-10 rounded-2xl flex items-center justify-center">
              <i data-lucide="layout-dashboard" class="w-5 h-5 text-lavender-dark"></i>
            </span>
            <span class="font-medium">仪表盘</span>
          </a>
          <a href="keywords.html" class="nav-item flex items-center gap-3 px-4 py-3 text-text-secondary cursor-pointer">
            <span class="icon-pill w-10 h-10 rounded-2xl flex items-center justify-center">
              <i data-lucide="keyword" class="w-5 h-5 text-mint-dark"></i>
            </span>
            <span class="font-medium">关键词</span>
          </a>
          <a href="notifications.html" class="nav-item flex items-center gap-3 px-4 py-3 text-text-secondary cursor-pointer">
            <span class="icon-pill w-10 h-10 rounded-2xl flex items-center justify-center">
              <i data-lucide="bell" class="w-5 h-5 text-coral-dark"></i>
            </span>
            <span class="font-medium">通知记录</span>
          </a>
          <a href="settings.html" class="nav-item active flex items-center gap-3 px-4 py-3 text-text-primary cursor-pointer">
            <span class="icon-pill w-10 h-10 rounded-2xl flex items-center justify-center">
              <i data-lucide="settings" class="w-5 h-5 text-coral-dark"></i>
            </span>
            <span class="font-medium">设置</span>
          </a>
        </div>
        <div class="p-4 mx-2 my-2 rounded-2xl" style="background: rgba(255,255,255,0.2); border: 0.5px solid rgba(255,255,255,0.3);">
          <div class="text-xs text-text-muted mb-2">数据来源</div>
          <div class="flex items-center gap-2">
            <span class="icon-pill px-3 py-1 rounded-full text-xs font-medium text-sky flex items-center gap-1.5">
              <svg class="w-3.5 h-3.5"><use href="#icon-x"/></svg>
              X
            </span>
            <span class="icon-pill px-3 py-1 rounded-full text-xs font-medium text-mint flex items-center gap-1.5">
              <svg class="w-3.5 h-3.5"><use href="#icon-bing"/></svg>
              Bing
            </span>
          </div>
        </div>
      </nav>

      <!-- Content Area -->
      <main class="flex-1 flex flex-col overflow-hidden liquid-glass" style="border-radius: 24px;">

        <!-- Toolbar -->
        <div class="liquid-glass flex items-center px-6 py-4" style="border-radius: 0; border-bottom: 0.5px solid rgba(255,255,255,0.4);">
          <h2 class="font-display text-xl flex items-center gap-3">
            <span class="icon-pill w-12 h-12 rounded-2xl flex items-center justify-center">
              <i data-lucide="settings" class="w-6 h-6 text-coral-dark"></i>
            </span>
            <span class="text-text-primary font-semibold">系统设置</span>
          </h2>
        </div>

        <!-- Settings Content -->
        <div class="flex-1 overflow-y-auto p-6 max-w-3xl">

          <!-- Notification Settings -->
          <section class="mb-8">
            <h3 class="font-display text-lg text-lavender-dark font-semibold mb-4 flex items-center gap-2">
              <i data-lucide="bell" class="w-5 h-5"></i>
              通知设置
            </h3>
            <div class="liquid-card rounded-3xl overflow-hidden" style="border-radius: 28px;">

              <!-- Browser Notification -->
              <div class="flex items-center justify-between p-5" style="border-bottom: 0.5px solid rgba(255,255,255,0.3);">
                <div>
                  <div class="font-semibold text-text-primary">浏览器通知</div>
                  <div class="text-text-secondary text-sm">接收到热点时弹出浏览器通知</div>
                </div>
                <div class="toggle-switch active" onclick="this.classList.toggle('active')"></div>
              </div>

              <!-- Email Notification -->
              <div class="flex items-center justify-between p-5" style="border-bottom: 0.5px solid rgba(255,255,255,0.3);">
                <div>
                  <div class="font-semibold text-text-primary">邮件通知</div>
                  <div class="text-text-secondary text-sm">接收热点邮件通知</div>
                </div>
                <div class="toggle-switch active" onclick="this.classList.toggle('active')"></div>
              </div>

              <!-- Email Address -->
              <div class="p-5" style="border-bottom: 0.5px solid rgba(255,255,255,0.3);">
                <div class="font-semibold text-text-primary mb-2">接收邮箱</div>
                <input
                  type="email"
                  value="user@example.com"
                  class="glass-input w-full px-4 py-3 rounded-2xl text-text-primary"
                  placeholder="输入邮箱地址"
                >
              </div>

              <!-- Notification Frequency -->
              <div class="p-5" style="border-bottom: 0.5px solid rgba(255,255,255,0.3);">
                <div class="font-semibold text-text-primary mb-2">通知频率</div>
                <select class="glass-select w-full px-4 py-3 rounded-2xl text-text-primary cursor-pointer">
                  <option value="realtime">实时通知</option>
                  <option value="hourly">每小时汇总</option>
                  <option value="daily" selected>每日汇总</option>
                  <option value="disabled">关闭</option>
                </select>
              </div>

              <!-- Quiet Hours -->
              <div class="p-5">
                <div class="flex items-center justify-between mb-3">
                  <div>
                    <div class="font-semibold text-text-primary">静默时段</div>
                    <div class="text-text-secondary text-sm">在指定时间段内不发送通知</div>
                  </div>
                  <div class="toggle-switch" onclick="this.classList.toggle('active')"></div>
                </div>
                <div class="flex items-center gap-3 mt-3">
                  <input type="time" value="22:00" class="glass-input flex-1 px-4 py-2.5 rounded-2xl text-text-primary">
                  <span class="text-text-muted">至</span>
                  <input type="time" value="08:00" class="glass-input flex-1 px-4 py-2.5 rounded-2xl text-text-primary">
                </div>
              </div>

            </div>
          </section>

          <!-- Monitor Settings -->
          <section class="mb-8">
            <h3 class="font-display text-lg text-coral-dark font-semibold mb-4 flex items-center gap-2">
              <i data-lucide="radar" class="w-5 h-5"></i>
              监控设置
            </h3>
            <div class="liquid-card rounded-3xl overflow-hidden" style="border-radius: 28px;">

              <!-- Scan Interval -->
              <div class="p-5" style="border-bottom: 0.5px solid rgba(255,255,255,0.3);">
                <div class="font-semibold text-text-primary mb-2">扫描间隔</div>
                <select class="glass-select w-full px-4 py-3 rounded-2xl text-text-primary cursor-pointer">
                  <option value="15">每 15 分钟</option>
                  <option value="30" selected>每 30 分钟</option>
                  <option value="60">每 1 小时</option>
                  <option value="120">每 2 小时</option>
                </select>
              </div>

              <!-- Data Sources -->
              <div class="p-5" style="border-bottom: 0.5px solid rgba(255,255,255,0.3);">
                <div class="font-semibold text-text-primary mb-3">数据源</div>
                <div class="space-y-3">
                  <label class="flex items-center gap-3 cursor-pointer">
                    <input type="checkbox" checked class="w-5 h-5 rounded" style="accent-color: #7DCTAA;">
                    <span class="flex items-center gap-2">
                      <svg class="w-5 h-5"><use href="#icon-x"/></svg>
                      <span class="text-text-primary">X (Twitter)</span>
                    </span>
                  </label>
                  <label class="flex items-center gap-3 cursor-pointer">
                    <input type="checkbox" checked class="w-5 h-5 rounded" style="accent-color: #7DCTAA;">
                    <span class="flex items-center gap-2">
                      <svg class="w-5 h-5"><use href="#icon-bing"/></svg>
                      <span class="text-text-primary">Bing 搜索</span>
                    </span>
                  </label>
                </div>
              </div>

              <!-- Auto Scan -->
              <div class="flex items-center justify-between p-5">
                <div>
                  <div class="font-semibold text-text-primary">自动扫描</div>
                  <div class="text-text-secondary text-sm">按设定间隔自动扫描新热点</div>
                </div>
                <div class="toggle-switch active" onclick="this.classList.toggle('active')"></div>
              </div>

            </div>
          </section>

          <!-- API Settings -->
          <section class="mb-8">
            <h3 class="font-display text-lg text-mint-dark font-semibold mb-4 flex items-center gap-2">
              <i data-lucide="key" class="w-5 h-5"></i>
              API 配置
            </h3>
            <div class="liquid-card rounded-3xl overflow-hidden" style="border-radius: 28px;">

              <!-- OpenRouter API Key -->
              <div class="p-5" style="border-bottom: 0.5px solid rgba(255,255,255,0.3);">
                <div class="font-semibold text-text-primary mb-2">OpenRouter API Key</div>
                <div class="relative">
                  <input
                    type="password"
                    value="sk-or-v1-xxxxx...xxxxx"
                    class="glass-input w-full px-4 py-3 pr-10 rounded-2xl text-text-primary font-mono text-sm"
                  >
                  <button class="absolute right-3 top-1/2 -translate-y-1/2 text-text-muted hover:text-text-primary cursor-pointer">
                    <i data-lucide="eye" class="w-5 h-5"></i>
                  </button>
                </div>
              </div>

              <!-- Twitter API Key -->
              <div class="p-5">
                <div class="font-semibold text-text-primary mb-2">Twitter API Key (可选)</div>
                <input
                  type="password"
                  placeholder="输入 Twitter API Key"
                  class="glass-input w-full px-4 py-3 rounded-2xl text-text-primary placeholder-text-muted font-mono text-sm"
                >
              </div>

            </div>
          </section>

          <!-- Save Button -->
          <div class="flex justify-end gap-3">
            <button class="glass-btn px-6 py-3 rounded-2xl text-text-secondary font-semibold">
              取消
            </button>
            <button class="glass-btn-primary px-6 py-3 rounded-2xl text-white font-semibold" style="border-radius: 20px;">
              保存设置
            </button>
          </div>

        </div>
      </main>
    </div>
  </div>

  <script>
    lucide.createIcons();
  </script>

</body>
</html>
